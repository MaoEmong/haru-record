<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>19a — 오늘 (Now Playing)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:-apple-system,'Helvetica Neue',sans-serif; }

.phone { width:390px; height:844px; background:#0D0D0D; border-radius:50px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 40px 120px rgba(0,0,0,0.95); }

/* Status */
.status { height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; font-size:12px; font-weight:600; color:#888; flex-shrink:0; }

/* Header */
.header { padding:4px 20px 0; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.header-back { font-size:22px; color:#888; }
.header-title { font-size:12px; font-weight:700; color:#888; letter-spacing:1.5px; text-transform:uppercase; }
.header-more { font-size:22px; color:#888; }

/* Scroll content */
.scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
.scroll::-webkit-scrollbar { display:none; }

/* Album art */
.album-wrap { padding:20px 36px 16px; }
.album-art {
  width:100%; aspect-ratio:1/1;
  border-radius:12px;
  background: linear-gradient(145deg, #0A2A0A 0%, #1A4A1A 35%, #0D380D 65%, #081E08 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow: 0 24px 64px rgba(29,185,84,0.25), 0 4px 16px rgba(0,0,0,0.8);
  position:relative; overflow:hidden;
}
.album-art::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 30% 30%, rgba(29,185,84,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 70%, rgba(29,185,84,0.08) 0%, transparent 50%);
}
.album-map { font-size:72px; filter:drop-shadow(0 4px 12px rgba(29,185,84,0.4)); z-index:1; }
.album-date { font-size:13px; font-weight:800; color:#1DB954; letter-spacing:3px; margin-top:12px; z-index:1; }
.album-places { font-size:11px; color:#5A8A5A; margin-top:4px; z-index:1; letter-spacing:0.5px; }
.album-badge {
  position:absolute; top:14px; right:14px;
  background:rgba(29,185,84,0.2); border:1px solid rgba(29,185,84,0.4);
  border-radius:20px; padding:4px 10px;
  font-size:10px; font-weight:700; color:#1DB954;
  display:flex; align-items:center; gap:5px; z-index:1;
}
.rec-dot { width:6px; height:6px; border-radius:50%; background:#1DB954; animation:pulse 1.4s ease-in-out infinite; }

/* Track info row */
.track-row { padding:0 24px 4px; display:flex; align-items:flex-start; justify-content:space-between; }
.track-text {}
.track-title { font-size:22px; font-weight:700; color:#fff; }
.track-sub { font-size:13px; color:#888; margin-top:3px; }
.track-fav { font-size:26px; color:#1DB954; }

/* Stats chips */
.stats-row { display:flex; gap:8px; padding:10px 24px 14px; overflow-x:auto; }
.stats-row::-webkit-scrollbar { display:none; }
.stat-chip {
  flex-shrink:0;
  background:#1A1A1A; border-radius:20px;
  padding:7px 14px;
  display:flex; align-items:center; gap:6px;
}
.sc-icon { font-size:14px; }
.sc-val { font-size:13px; font-weight:700; color:#fff; }
.sc-label { font-size:11px; color:#888; }

/* Waveform */
.waveform { height:48px; display:flex; align-items:center; gap:2px; padding:0 24px; margin-bottom:6px; overflow:hidden; }
.wave-bar { flex:1; border-radius:2px; min-width:1px; }

/* Progress */
.progress-wrap { padding:0 24px 14px; }
.progress-bar { height:4px; background:#333; border-radius:2px; margin-bottom:8px; position:relative; cursor:pointer; }
.progress-fill { height:100%; background:#fff; border-radius:2px; width:40%; }
.progress-knob { width:12px; height:12px; background:#fff; border-radius:50%; position:absolute; top:-4px; left:40%; transform:translateX(-50%); }
.progress-times { display:flex; justify-content:space-between; font-size:11px; color:#888; font-weight:600; }

/* Controls */
.controls { display:flex; align-items:center; justify-content:space-between; padding:0 20px 16px; }
.ctrl { font-size:20px; color:#888; cursor:pointer; width:44px; text-align:center; }
.ctrl.green { color:#1DB954; font-size:18px; }
.ctrl.primary { font-size:56px; color:#fff; display:flex; align-items:center; justify-content:center; }

/* Device row */
.device-row { display:flex; align-items:center; gap:10px; padding:0 24px 16px; }
.device-icon { font-size:14px; color:#888; }
.device-bar { flex:1; height:4px; background:#333; border-radius:2px; }
.device-fill { height:100%; background:#888; border-radius:2px; width:65%; }

/* Divider */
.divider { height:1px; background:#1A1A1A; margin:0 24px; }

/* Current location card */
.now-section { padding:16px 24px 0; }
.section-label { font-size:11px; font-weight:700; color:#888; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
.current-card {
  background:#1A1A1A; border-radius:12px; padding:14px 16px;
  display:flex; align-items:center; gap:14px;
  border:1px solid rgba(29,185,84,0.25);
}
.current-icon { width:48px; height:48px; border-radius:50%; background:#242424; display:flex; align-items:center; justify-content:center; font-size:24px; }
.current-info { flex:1; }
.current-name { font-size:15px; font-weight:700; color:#fff; }
.current-since { font-size:12px; color:#888; margin-top:2px; }
.current-dur { font-size:12px; color:#1DB954; font-weight:700; }
.live-bars { display:flex; gap:2px; align-items:flex-end; height:18px; }
.lb { width:3px; border-radius:2px; background:#1DB954; }

/* Recent visits */
.recent-section { padding:14px 24px 20px; }
.recent-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #1A1A1A; }
.ri-num { font-size:13px; color:#888; width:20px; }
.ri-art { width:40px; height:40px; border-radius:6px; background:#1A1A1A; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.ri-info { flex:1; }
.ri-name { font-size:14px; font-weight:600; color:#fff; }
.ri-time { font-size:12px; color:#888; margin-top:1px; }
.ri-dur { font-size:12px; color:#888; }

/* Bottom nav */
.bottom-nav { height:72px; background:#0D0D0D; border-top:1px solid #1A1A1A; display:flex; flex-shrink:0; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; }
.ni { font-size:22px; color:#555; }
.ni.on { color:#1DB954; }
.nl { font-size:10px; font-weight:600; color:#555; }
.nl.on { color:#1DB954; }
</style>
</head>
<body>
<div class="phone">
  <div class="status"><span>9:41</span><span>●●● 100%</span></div>

  <div class="header">
    <span class="header-back"></span>
    <span class="header-title">오늘의 하루</span>
    <span class="header-more">•••</span>
  </div>

  <div class="scroll">
    <!-- Album Art -->
    <div class="album-wrap">
      <div class="album-art">
        <div class="album-badge"><div class="rec-dot"></div>기록 중</div>
        <div class="album-map">🗺️</div>
        <div class="album-date">APR 28</div>
        <div class="album-places">집 · 회사 · 카페 · 마트</div>
      </div>
    </div>

    <!-- Track info -->
    <div class="track-row">
      <div class="track-text">
        <div class="track-title">오늘의 하루</div>
        <div class="track-sub">12.4 km · 4곳 방문</div>
      </div>
      <div class="track-fav">♥</div>
    </div>

    <!-- Stats chips -->
    <div class="stats-row">
      <div class="stat-chip"><span class="sc-icon">👟</span><span class="sc-val">8,240</span><span class="sc-label">걸음</span></div>
      <div class="stat-chip"><span class="sc-icon">📍</span><span class="sc-val">4</span><span class="sc-label">장소</span></div>
      <div class="stat-chip"><span class="sc-icon">⏱</span><span class="sc-val">9h 41m</span><span class="sc-label">경과</span></div>
      <div class="stat-chip"><span class="sc-icon">🔥</span><span class="sc-val">97일</span><span class="sc-label">연속</span></div>
    </div>

    <!-- Waveform -->
    <div class="waveform" id="wf"></div>

    <!-- Progress bar (time of day) -->
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill"></div>
        <div class="progress-knob"></div>
      </div>
      <div class="progress-times"><span>09:41</span><span>23:59</span></div>
    </div>

    <!-- Controls (재해석: 어제/일시정지/내일/인사이트) -->
    <div class="controls">
      <div class="ctrl green">⇄</div>
      <div class="ctrl">⏮</div>
      <div class="ctrl primary">⏸</div>
      <div class="ctrl">⏭</div>
      <div class="ctrl green">↻</div>
    </div>

    <!-- Volume / intensity -->
    <div class="device-row">
      <div class="device-icon">🔈</div>
      <div class="device-bar"><div class="device-fill"></div></div>
      <div class="device-icon">🔊</div>
    </div>

    <div class="divider"></div>

    <!-- Currently at -->
    <div class="now-section">
      <div class="section-label">현재 위치</div>
      <div class="current-card">
        <div class="current-icon">🏢</div>
        <div class="current-info">
          <div class="current-name">회사</div>
          <div class="current-since">오전 9:30 도착</div>
        </div>
        <div>
          <div class="current-dur">8h 11m</div>
          <div class="live-bars">
            <div class="lb" style="height:6px;animation:lb1 0.7s ease-in-out infinite alternate;"></div>
            <div class="lb" style="height:12px;animation:lb2 0.8s ease-in-out infinite alternate;"></div>
            <div class="lb" style="height:8px;animation:lb3 0.6s ease-in-out infinite alternate;"></div>
            <div class="lb" style="height:14px;animation:lb2 0.9s ease-in-out infinite alternate;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent -->
    <div class="recent-section">
      <div class="section-label" style="margin-bottom:8px;">오늘 방문한 곳</div>
      <div class="recent-item">
        <div class="ri-num">1</div>
        <div class="ri-art">🏠</div>
        <div class="ri-info"><div class="ri-name">집</div><div class="ri-time">07:00 — 09:00</div></div>
        <div class="ri-dur">2h 0m</div>
      </div>
      <div class="recent-item">
        <div class="ri-num" style="color:#1DB954;">▶</div>
        <div class="ri-art" style="border:1px solid rgba(29,185,84,0.4);">🏢</div>
        <div class="ri-info"><div class="ri-name" style="color:#1DB954;">회사</div><div class="ri-time" style="color:#1DB954;">09:30 — 진행 중</div></div>
        <div class="ri-dur" style="color:#1DB954;">8h 11m</div>
      </div>
      <div class="recent-item" style="opacity:0.45;">
        <div class="ri-num">3</div>
        <div class="ri-art">☕</div>
        <div class="ri-info"><div class="ri-name">카페</div><div class="ri-time">저녁 예정</div></div>
        <div class="ri-dur">—</div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item"><div class="ni on">▶️</div><div class="nl on">오늘</div></div>
    <div class="nav-item"><div class="ni">📋</div><div class="nl">기록</div></div>
    <div class="nav-item"><div class="ni">📍</div><div class="nl">장소</div></div>
    <div class="nav-item"><div class="ni">⚙️</div><div class="nl">설정</div></div>
  </div>
</div>

<style>
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes lb1 { from{height:4px} to{height:14px} }
@keyframes lb2 { from{height:8px} to{height:4px} }
@keyframes lb3 { from{height:10px} to{height:18px} }
</style>
<script>
// Waveform
const wf = document.getElementById('wf');
const hs = [6,12,20,16,28,22,14,26,18,10,24,30,16,20,12,26,18,14,22,28,16,10,20,14,26,18,12,24,16,22,18,14,26,20,12,16,24,18,14,22,8,14,20,18,28,22,14,26,20,12,26,30,18,22];
const played = Math.floor(hs.length * 0.40);
hs.forEach((h, i) => {
  const b = document.createElement('div');
  b.className = 'wave-bar';
  const done = i < played;
  b.style.cssText = `height:${h}px;background:${done?'#fff':'#333'};animation:wa${i%5} ${0.7+Math.random()*0.7}s ease-in-out infinite alternate;`;
  wf.appendChild(b);
});
const st = document.createElement('style');
for (let k=0;k<5;k++) st.textContent += `@keyframes wa${k}{from{transform:scaleY(0.55)}to{transform:scaleY(1)}}`;
document.head.appendChild(st);
</script>
</body>
</html>
